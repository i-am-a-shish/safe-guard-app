name: womens_safety_app
description: "SafeGuardHer - Women's Safety App with AI-powered distress detection"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # TFLite Inference
  tflite_flutter: ^0.11.0

  # Audio Capture
  record: ^5.2.1

  # Background Service
  flutter_background_service: ^5.0.12

  # GPS Location
  geolocator: ^13.0.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Permissions
  permission_handler: ^11.3.1

  # URL Launcher
  url_launcher: ^6.3.1

  # Path Provider
  path_provider: ^2.1.5

  # Camera for video recording on alert
  camera: ^0.12.0

  # Share recordings with contacts
  share_plus: ^10.1.4

  # Google Fonts
  google_fonts: ^6.2.1

  # Vibration / Haptic Feedback
  vibration: ^2.0.0

  # Intl for date formatting
  intl: ^0.19.0

  # UUID for unique IDs
  uuid: ^4.5.1

  # HTTP client for Flask inference API
  http: ^1.2.2

  # Save recordings to device gallery
  gallery_saver_plus: ^3.2.3

  # Open video files for playback
  open_file_plus: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
